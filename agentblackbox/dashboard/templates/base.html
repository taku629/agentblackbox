<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}AgentBlackBox{% endblock %}</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
  <style>
    /* ── Variables ─────────────────────────────────────────────────── */
    :root {
      --bg:         #0f1117;
      --surface:    #1a1d27;
      --surface2:   #252836;
      --surface3:   #2d3148;
      --border:     #2d3148;
      --accent:     #6366f1;
      --accent-h:   #818cf8;
      --text:       #e2e8f0;
      --text-muted: #94a3b8;
      --success:    #22c55e;
      --error:      #ef4444;
      --warning:    #f59e0b;
      --info:       #3b82f6;
      --cyan:       #06b6d4;
      --sidebar-w:  220px;
      --radius:     8px;
    }

    /* ── Reset ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      min-height: 100vh;
      font-size: 14px;
      line-height: 1.6;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-h); }

    /* ── Sidebar ───────────────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 200;
      transition: transform 0.25s ease;
    }
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 20px 16px 16px;
      border-bottom: 1px solid var(--border);
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
      text-decoration: none;
    }
    .sidebar-logo svg { flex-shrink: 0; }
    .sidebar-nav { padding: 12px 8px; flex: 1; display: flex; flex-direction: column; gap: 2px; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: var(--radius);
      color: var(--text-muted);
      font-size: 13.5px;
      font-weight: 500;
      transition: background 0.15s, color 0.15s;
      cursor: pointer;
      text-decoration: none;
    }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: rgba(99,102,241,0.15); color: var(--accent); }
    .nav-icon { width: 18px; height: 18px; opacity: 0.8; }
    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ── Topbar ─────────────────────────────────────────────────────── */
    .topbar {
      display: none;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .hamburger {
      background: none;
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 16px;
      line-height: 1;
    }

    /* ── Main content ───────────────────────────────────────────────── */
    .main {
      margin-left: var(--sidebar-w);
      flex: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .content { padding: 28px 32px; max-width: 1400px; width: 100%; }

    /* ── Overlay (mobile) ───────────────────────────────────────────── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 150;
    }

    /* ── Typography ─────────────────────────────────────────────────── */
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    h2 { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
    h3 { font-size: 14px; font-weight: 600; }
    .page-header { margin-bottom: 24px; }
    .page-header p { color: var(--text-muted); font-size: 13px; margin-top: 2px; }

    /* ── Cards ──────────────────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .card-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .card-value { font-size: 26px; font-weight: 700; line-height: 1.2; }
    .card-sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    /* ── Status badges ──────────────────────────────────────────────── */
    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 20px;
      font-size: 11.5px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .badge-success { background: rgba(34,197,94,0.15); color: var(--success); }
    .badge-error   { background: rgba(239,68,68,0.15); color: var(--error); }
    .badge-running {
      background: rgba(59,130,246,0.15); color: var(--info);
      animation: badge-pulse 2s ease-in-out infinite;
    }
    @keyframes badge-pulse { 0%,100%{opacity:1} 50%{opacity:0.6} }

    /* ── Table ──────────────────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; }
    thead { background: var(--surface2); }
    th {
      padding: 10px 14px;
      font-size: 11.5px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      white-space: nowrap;
    }
    td { padding: 11px 14px; border-top: 1px solid var(--border); vertical-align: middle; }
    tbody tr { transition: background 0.1s; }
    tbody tr:hover td { background: var(--surface2); cursor: pointer; }
    .cell-mono { font-family: "Fira Code", "Consolas", monospace; font-size: 12px; }
    .cell-muted { color: var(--text-muted); font-size: 12.5px; }

    /* ── Forms / Filters ────────────────────────────────────────────── */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: flex-end;
      margin-bottom: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
    }
    .filter-group { display: flex; flex-direction: column; gap: 4px; }
    .filter-group label { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    input[type="text"], input[type="date"], select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 7px 10px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      min-width: 140px;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus, input[type="date"]:focus, select:focus { border-color: var(--accent); }
    input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(0.7); cursor: pointer; }
    select option { background: var(--surface); }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.15s, color 0.15s;
      font-family: inherit;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-h); }
    .btn-outline { background: transparent; border-color: var(--border); color: var(--text-muted); }
    .btn-outline:hover { background: var(--surface2); color: var(--text); }
    .btn-sm { padding: 5px 10px; font-size: 12px; }

    /* ── Code / Pre ─────────────────────────────────────────────────── */
    pre {
      background: #1a1d27 !important;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      overflow-x: auto;
      font-size: 12px;
      line-height: 1.5;
      max-height: 400px;
    }
    code { font-family: "Fira Code", "Cascadia Code", "Consolas", monospace; }

    /* ── Timeline ───────────────────────────────────────────────────── */
    .timeline { position: relative; padding-left: 28px; }
    .timeline::before {
      content: '';
      position: absolute;
      left: 10px; top: 8px; bottom: 8px;
      width: 2px;
      background: var(--border);
      border-radius: 2px;
    }
    .tl-item { position: relative; margin-bottom: 10px; }
    .tl-dot {
      position: absolute;
      left: -24px; top: 14px;
      width: 12px; height: 12px;
      border-radius: 50%;
      border: 2px solid var(--bg);
      z-index: 1;
    }
    .tl-llm   .tl-dot { background: var(--accent); }
    .tl-tool  .tl-dot { background: var(--cyan); }
    .tl-error .tl-dot { background: var(--error); }

    details.tl-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    details.tl-card[open] { border-color: var(--surface3); }
    details.tl-card summary {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 11px 14px;
      cursor: pointer;
      user-select: none;
      list-style: none;
      font-size: 13px;
    }
    details.tl-card summary::-webkit-details-marker { display: none; }
    details.tl-card summary:hover { background: var(--surface2); }
    .tl-arrow {
      margin-left: auto;
      color: var(--text-muted);
      font-size: 10px;
      transition: transform 0.2s;
    }
    details.tl-card[open] .tl-arrow { transform: rotate(90deg); }
    .tl-expand { padding: 0 14px 14px; }
    .tl-section { margin-top: 12px; }
    .tl-section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .tl-meta { display: flex; flex-wrap: wrap; gap: 10px; font-size: 12px; color: var(--text-muted); margin-top: 4px; }
    .tl-meta span { background: var(--surface2); padding: 2px 8px; border-radius: 4px; }
    .tl-time { font-family: monospace; font-size: 11.5px; color: var(--text-muted); white-space: nowrap; }

    /* ── Charts ─────────────────────────────────────────────────────── */
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 24px;
    }
    .chart-wrap { position: relative; height: 260px; }
    .period-btns { display: flex; gap: 6px; margin-bottom: 20px; }
    .period-btn {
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 500;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .period-btn:hover { border-color: var(--accent); color: var(--accent); }
    .period-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── Sidebar stats ──────────────────────────────────────────────── */
    .detail-layout {
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 24px;
      align-items: start;
    }
    .sidebar-stats { position: sticky; top: 20px; }
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .stat-row:last-child { border-bottom: none; }
    .stat-label { color: var(--text-muted); }
    .stat-value { font-weight: 600; font-family: monospace; font-size: 12.5px; }

    /* ── Misc ───────────────────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state p { margin-top: 8px; font-size: 13px; }
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline; }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .tag-pill {
      display: inline-block;
      padding: 1px 7px;
      border-radius: 4px;
      font-size: 11px;
      background: var(--surface2);
      color: var(--text-muted);
    }

    /* ── Mobile ─────────────────────────────────────────────────────── */
    @media (max-width: 900px) {
      .detail-layout { grid-template-columns: 1fr; }
      .sidebar-stats { position: static; }
    }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      body.sb-open .sidebar { transform: translateX(0); }
      body.sb-open .overlay { display: block; }
      .main { margin-left: 0; }
      .topbar { display: flex; }
      .content { padding: 16px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .filter-bar { flex-direction: column; align-items: stretch; }
      input[type="text"], input[type="date"], select { min-width: unset; width: 100%; }
    }
    @media (max-width: 480px) {
      .stats-grid { grid-template-columns: 1fr; }
      .charts-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- Overlay (mobile) -->
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- Sidebar -->
<nav class="sidebar" id="sidebar">
  <a class="sidebar-logo" href="/">
    <!-- SVG logo: black box with play button -->
    <svg width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="30" height="30" rx="5" fill="#1a1d27"/>
      <rect x="1" y="1" width="28" height="28" rx="4" stroke="#6366f1" stroke-width="1.5"/>
      <polygon points="11,8 11,22 23,15" fill="#6366f1"/>
      <circle cx="7" cy="15" r="2" fill="#6366f1" opacity="0.5"/>
    </svg>
    <span>AgentBlackBox</span>
  </a>
  <div class="sidebar-nav">
    <a href="/" class="nav-item {% if active_page == 'sessions' %}active{% endif %}">
      <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor">
        <path d="M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-.293.707L13 10.414V17a1 1 0 01-.553.894l-4-2A1 1 0 018 15v-4.586L3.293 6.707A1 1 0 013 6V4z"/>
      </svg>
      Sessions
    </a>
    <a href="/analytics" class="nav-item {% if active_page == 'analytics' %}active{% endif %}">
      <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor">
        <path d="M2 11a1 1 0 011-1h2a1 1 0 011 1v5a1 1 0 01-1 1H3a1 1 0 01-1-1v-5zm6-4a1 1 0 011-1h2a1 1 0 011 1v9a1 1 0 01-1 1H9a1 1 0 01-1-1V7zm6-3a1 1 0 011-1h2a1 1 0 011 1v12a1 1 0 01-1 1h-2a1 1 0 01-1-1V4z"/>
      </svg>
      Analytics
    </a>
  </div>
  <div class="sidebar-footer">v0.1.0 · recordings.db</div>
</nav>

<!-- Main -->
<div class="main">
  <!-- Mobile topbar -->
  <div class="topbar">
    <button class="hamburger" onclick="openSidebar()" aria-label="Menu">☰</button>
    <span style="font-weight:700;font-size:14px;">AgentBlackBox</span>
  </div>

  <div class="content">
    {% block content %}{% endblock %}
  </div>
</div>

<!-- CDN scripts -->
<script src="https://unpkg.com/htmx.org@2.0.4"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js"></script>
<script>
  // Highlight all code blocks
  document.addEventListener('DOMContentLoaded', () => hljs.highlightAll());
  // Re-highlight after htmx swaps
  document.addEventListener('htmx:afterSwap', () => hljs.highlightAll());

  // Mobile sidebar
  function openSidebar()  { document.body.classList.add('sb-open'); }
  function closeSidebar() { document.body.classList.remove('sb-open'); }

  // Chart.js dark defaults
  Chart.defaults.color = '#94a3b8';
  Chart.defaults.borderColor = '#2d3148';
  Chart.defaults.plugins.legend.labels.boxWidth = 12;
</script>
{% block scripts %}{% endblock %}
</body>
</html>
